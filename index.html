<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <!-- Location -->
        <div class="location">
            <h2>📍 San Francisco</h2>
            <span class="icon">☀️</span>
        </div>

        <!-- Temperature -->
        <div class="temp">
            <div class="main-temp">72<sup>°F</sup></div>
            <div class="condition">Clear Sky</div>
            <div class="high-low">
                <span>↑ 76°</span>
                <span>↓ 64°</span>
            </div>
        </div>

        <!-- Details -->
        <div class="details">
            <div class="detail-item">
                <div class="value">65%</div>
                <div class="label">Humidity</div>
            </div>
            <div class="detail-item">
                <div class="value">12 mph</div>
                <div class="label">Wind</div>
            </div>
            <div class="detail-item">
                <div class="value">30.1</div>
                <div class="label">Pressure</div>
            </div>
        </div>

        <!-- Forecast -->
        <div class="forecast">
            <div class="forecast-day">
                <div class="day">Mon</div>
                <div class="high">74°</div>
                <div class="low">62°</div>
            </div>
            <div class="forecast-day">
                <div class="day">Tue</div>
                <div class="high">76°</div>
                <div class="low">63°</div>
            </div>
            <div class="forecast-day">
                <div class="day">Wed</div>
                <div class="high">71°</div>
                <div class="low">60°</div>
            </div>
            <div class="forecast-day">
                <div class="day">Thu</div>
                <div class="high">73°</div>
                <div class="low">61°</div>
            </div>
            <div class="forecast-day">
                <div class="day">Fri</div>
                <div class="high">75°</div>
                <div class="low">63°</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" placeholder="🔍 Search city...">
            <button>Search</button>
        </div>
    </div>
</body>
</html>
